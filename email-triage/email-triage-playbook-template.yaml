version: 1

notes: |
  Этот файл нужен для постепенной калибровки поведения.
  После каждого ложного решения добавляй правило сюда.
  Не пытайся сделать идеальный skill с первого раза.
  Делай playbook из реальных коррекций.

sender_policies:
  vip:
    - email: ""
      reason: ""
  newsletters_full_translate:
    - email: ""
      reason: ""
  newsletters_summarize_only:
    - email: ""
      reason: ""
  always_noise:
    - domain: ""
      reason: ""
  always_finance:
    - email: ""
      reason: ""

classification_overrides:
  - match:
      sender: ""
      subject_contains: ""
    force_bucket: ""
    confidence: ""
    note: ""

linear_rules:
  never_promote_subject_contains:
    - "receipt"
    - "invoice paid"
    - "newsletter"
    - "digest"
    - "welcome"
  always_promote_if_subject_contains:
    - "review needed"
    - "deadline"
    - "contract"
    - "renewal"
  title_patterns:
    - when_subject_contains: "contract"
      title_template: "Review contract terms for {{entity}}"
    - when_subject_contains: "renewal"
      title_template: "Decide renewal for {{entity}}"

digest_preferences:
  show_finance_even_if_no_action: true
  show_newsletters_as_compact_summary: true
  hide_low_value_noise: false

retrospective_checklist:
  - "Был ли создан мусорный task?"
  - "Был ли пропущен реально важный email?"
  - "Была ли рассылка слишком длинной?"
  - "Не перепутали ли reply и action?"
  - "Есть ли новый sender-specific rule, который надо закрепить?"
